# ==============================================================
# nginx.conf — Custom Nginx configuration for Angular SPA
# Served inside the frontend Docker container (nginx:1.25-alpine)
# ==============================================================

# ── Gzip Compression ──────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/rss+xml
    application/atom+xml
    image/svg+xml
    font/truetype
    font/opentype
    application/vnd.ms-fontobject;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN"         always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection "1; mode=block"     always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Proxy Reverso → Back-end ──────────────────────────────
    # All requests starting with /api/ are forwarded to the Spring Boot service.
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
    }

    # ── Static Asset Cache ────────────────────────────────────
    # Angular hashed bundles (.js, .css) — cache for 1 year (immutable)
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Images, fonts and other assets — cache for 30 days
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ── SPA Routing ───────────────────────────────────────────
    # All unmatched requests fall back to index.html so Angular's
    # router handles client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health Check Endpoint ─────────────────────────────────
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
