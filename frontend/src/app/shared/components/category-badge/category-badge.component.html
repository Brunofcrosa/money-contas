<span class="inline-flex items-center gap-1 font-medium rounded-full" [class]="[
    size() === 'sm' ? 'text-xs px-2 py-0.5' : 'text-xs px-2.5 py-1'
  ].join(' ')" [style.color]="meta[category()].color" [style.backgroundColor]="meta[category()].color + '26'">
  <span>{{ meta[category()].icon }}</span>
  <span>{{ meta[category()].label }}</span>
</span>
