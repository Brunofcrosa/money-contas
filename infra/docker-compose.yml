# ==============================================================
# docker-compose.yml — money-contas full-stack
# Services: postgres, backend (Spring Boot), frontend (Angular/Nginx)
#
# Usage (run from the /infra directory):
#   cp .env.example .env          # configure your secrets (here in /infra/)
#   docker compose up --build     # first run (or after any change)
#   docker compose up -d          # subsequent runs in background
# ==============================================================

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: money-contas-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - money-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Spring Boot Back-end ──────────────────────────────────────
  backend:
    build:
      context: . # project root  (where Dockerfile lives)
      dockerfile: Dockerfile
    container_name: money-contas-backend
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - money-net
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Angular 17 / Nginx Front-end ─────────────────────────────
  frontend:
    build:
      context: ./frontend # Angular project root (where its Dockerfile lives)
      dockerfile: Dockerfile
    container_name: money-contas-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - money-net
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

# ── Volumes ───────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ── Networks ──────────────────────────────────────────────────
networks:
  money-net:
    driver: bridge
