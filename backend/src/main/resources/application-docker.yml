# ==============================================================
# application-docker.yml
# Spring Boot profile activated when SPRING_PROFILES_ACTIVE=docker
# All sensitive values are injected via environment variables
# (set in docker-compose.yml from the .env file).
# ==============================================================

spring:
  datasource:
    url:      ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Spring MVC / Security
  security:
    filter:
      order: 10

# ── Actuator (used by Docker health check) ───────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never

# ── Logging ──────────────────────────────────────────────────
logging:
  level:
    root:                               INFO
    com.moneycontas:                    INFO
    org.springframework.security:       WARN
    org.hibernate.SQL:                  WARN
